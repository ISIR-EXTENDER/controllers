controller_manager:
  ros__parameters:
    update_rate: 250  # Hz

    qontrol_explorer:
      type: qontrol_controller/QontrolVelocityController
      auto_start: false
      is_chainable: true

    kinematic_guides_cartesian_velocity:
      type: kinematic_guides_cartesian_velocity/SharedControlVelocityController
      auto_start: false
      

qontrol_explorer:
  ros__parameters:
    # Base parameters
    robot_description_origin: robot_state_publisher
    tip_frame: ft_frame
    root_frame: base_link
    state_interface:
      - position
      - velocity
      - effort
    robot_command: position

    # Velocity parameters
    command_max_linear_velocity: 0.05
    command_max_angular_velocity: 1.0
    refresh_mapping: True
    open_loop: True
    input_topic_name: /explorer_user_interfaces/rqt_armcontrol/input_device_velocity
    regularisation_weight: 1e-2
    root_frame_control: True
    deadzone: 0.1
    velocity_limit: 0.5
    horizon: 15
    p_gain: 100.0
    lambda: 0.1
    points_collision: [0.0, -0.6, 0.0, 0.0, -0.6, 1.0]
    wall_constraint_horizon: 15
    d_secure: 0.2
    d_prevent: 0.2
    elbow_frame: "link_3"
    handle_frame: "link_5"
kinematic_guides_cartesian_velocity:
  ros__parameters:
    # Activate / desactivate functions
    enable_shared_control_assistance: true
    enable_velocity_saturation: true
    enable_debug_publish: true

    # Low-pass filter
    #filter_cutoff_frequency: 0.8 # Hz
    initial_filter_cutoff_frequency: 6.0 # Hz
    final_filter_cutoff_frequency: 12.0 # Hz

    # Multi-target estimation: all goals are 6D
    # Default gripper orientation quaternion: [1.000, 0.003, 0.004, -0.001]
    goals_poses: [0., -0., 0., 0., 0., 0.7071, 0.7071] # experiment with two goals and changing target on run
    #goals_poses: [0.539, -0.066, 0.364, 0.901, 0.021, 0.433, 0.009] # experiment with 6D goal close
    # NOTE: quaternion order is (qx, qy, qz, qw) and should be unit-norm.

    known_goals_poses: [0., 0., 0., 0., 0., 0.7071, 0.7071] # experiment with two goals and changing target on run
    #known_goals_poses: [0.539, -0.066, 0.364, 0.901, 0.021, 0.433, 0.009] # experiment with 6D goal close
    known_goals_labels:    ["Bin A"]

    # Cartesian velocity saturation
    max_linear_delta: 0.0005 #0.0005
    max_angular_delta: 0.0005 #0.0005

    # Goals confidence 
    alpha_conf:    1.5        # [s^-1] #after fix in eq of c_dot using the normalization
    theta_l_deg:   30.0       # [deg]
    r1:            0.04       # [m]
    r2:            0.02       # [m]
    v_j_max:       0.055      # [m/s]
    gamma:         2.0
    theta1_deg:    15.0       # [deg]
    theta2_deg:    5.0        # [deg]
    # Reach goal params
    eps_t_reach_m:    0.01
    eps_r_reach_deg:  10.0
    reach_dwell_ms:   300
    robot_type: "explorer_velocity"
    # Forward Kinematics Configuration (URDF-driven)
    # Frame names must match the robot URDF model
    base_frame: "base_link"
    tool_frame: "tool0"
    input_twist_frame: "base"  # "base" or "ee"
    # Use RT joint buffer for FK readings (default false; rely on joint_states)
    use_rt_joint_buffer: false
    command_names:
      - "qontrol_explorer/linear_x"
      - "qontrol_explorer/linear_y"
      - "qontrol_explorer/linear_z"
      - "qontrol_explorer/angular_x"
      - "qontrol_explorer/angular_y"
      - "qontrol_explorer/angular_z"

goal_marker_publisher:
  ros__parameters:
    # ----------------- Frames -----------------
    base_frame: "base_link"
    ee_frame:   "tool0"    # apex for cones + agnostic sphere

    # ----------------- Geometry / viz -----------------
    r1:            0.04       # [m]
    r2:            0.02       # [m]
    theta_l_deg:  25.0
    rate_hz:      15.0
    draw_vectors: true            # draw u1 (cyan) and vE (red)
    ve_scale:     5.0             # visual scale for vE arrow

    # ----------------- Topics (must match controller pubs) -----------------
    conf_topic:         "/debug/goal_confidences"
    soft_goal_topic:    "/debug/soft_goal"
    raw_velocity_topic: "/debug/raw_velocity"

    goal_positions: [0.,0., 0.] # experiment with two goals and changing target on run
    
