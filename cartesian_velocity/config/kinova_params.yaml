controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robotiq_gripper_controller:
      type: position_controllers/GripperActionController

    fault_controller:
      type: picknik_reset_fault_controller/PicknikResetFaultController

    cartesian_velocity_teleop_controller:
      type: cartesian_velocity/CartesianVelocityTeleopController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
      - robotiq_85_left_knuckle_joint 

fault_controller:
  ros__parameters: {}

robotiq_gripper_controller:
  ros__parameters:
    default: true
    joint: robotiq_85_left_knuckle_joint
    allow_stalling: true

cartesian_velocity_teleop_controller:
  ros__parameters:
    robot_type: "kinova_velocity"
    # Make robot_description available from controller_manager's namespace
    robot_description: ""
    # Forward Kinematics Configuration (URDF-driven)
    # Frame names must match the robot URDF model
    base_frame: "base_link"
    tool_frame: "end_effector_link"
    input_twist_frame: "base"   # "base" or "ee"
    # Controller parameters
    gain: 1.0
    initial_filter_cutoff_frequency: 2.0
    max_linear_delta: 0.007
    max_angular_delta: 10.0
