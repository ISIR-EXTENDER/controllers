controller_manager:
  ros__parameters:
    update_rate: 750  # Hz

    qontrol_explorer:
      type: qontrol_controller/QontrolDecoupledVelocityController
      auto_start: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    robotiq_gripper_controller:
      type: forward_command_controller/ForwardCommandController
      auto_start: false

    cartesian_velocity_teleop_controller:
      type: cartesian_velocity/CartesianVelocityTeleopController

qontrol_explorer:
  ros__parameters:
    # Base parameters
    robot_description_origin: robot_state_publisher
    tip_frame: end_effector_link
    root_frame: base_link
    state_interface:
      - position
      - velocity
      - effort
    robot_command: position

    # Velocity parameters
    command_max_linear_velocity: 0.05
    command_max_angular_velocity: 1.0
    refresh_mapping: True
    open_loop: True
    input_topic_name: /explorer_user_interfaces/rqt_armcontrol/input_device_velocity
    regularisation_weight: 1e-2
    root_frame_control: True
    deadzone: 0.1
    velocity_limit: 0.5
    horizon: 15
    p_gain: 100.0
    lambda: 0.1

robotiq_gripper_controller:
  ros__parameters:
    joints:
      - robotiq_85_left_knuckle_joint
    interface_name: position

joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
      - robotiq_85_left_knuckle_joint 

cartesian_velocity_teleop_controller:
  ros__parameters:
    robot_type: "kinova_velocity"
    base_frame: "base_link"
    tool_frame: "end_effector_link"
    input_twist_frame: "ee"   # "base" or "ee"
    # Controller parameters
    gain: 1.0
    snake_gain: 5.0
    initial_filter_cutoff_frequency: 2.0
    max_linear_delta: 0.007
    max_angular_delta: 10.0
    # Command interfaces for Kinova twist control
    command_names:
      - "qontrol_explorer/linear_x"
      - "qontrol_explorer/linear_y"
      - "qontrol_explorer/linear_z"
      - "qontrol_explorer/angular_x"
      - "qontrol_explorer/angular_y"
      - "qontrol_explorer/angular_z"