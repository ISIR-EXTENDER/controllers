controller_manager:
  ros__parameters:
    update_rate: 250  # Hz

    qontrol_explorer:
      type: qontrol_controller/QontrolDecoupledVelocityController
      auto_start: false
      is_chainable: true

    snake_demo:
      type: cartesian_velocity/SnakeDemoTeleopController
      auto_start: false
      

qontrol_explorer:
  ros__parameters:
    # Base parameters
    robot_description_origin: robot_state_publisher
    tip_frame: ft_frame
    root_frame: base_link
    state_interface:
      - position
      - velocity
      - effort
    robot_command: velocity

    # Velocity parameters
    command_max_linear_velocity: 0.07
    command_max_angular_velocity: 1.0
    refresh_mapping: True
    open_loop: True
    input_topic_name: /explorer_user_interfaces/rqt_armcontrol/input_device_velocity
    regularisation_weight: 1e-2
    root_frame_control: True
    deadzone: 0.2
    velocity_limit: 0.5
    horizon: 15
    p_gain: 100.0
    lambda: 0.1
    points_collision: [0.0, -0.6, 0.0, 0.0, -0.6, 1.0]
    wall_constraint_horizon: 15
    d_secure: 0.2
    d_prevent: 0.2
    elbow_frame: "link_3"
    handle_frame: "link_5"

snake_demo:
  ros__parameters:
    gain: 0.07
    snake_gain: 20.0
    max_linear: 0.07
    max_angular: 0.2 
    deadzone_joy: 0.3
    robot_type: "explorer_velocity"
    tool_frame: "ft_frame"
    command_names:
      - "qontrol_explorer/linear_x"
      - "qontrol_explorer/linear_y"
      - "qontrol_explorer/linear_z"
      - "qontrol_explorer/angular_x"
      - "qontrol_explorer/angular_y"
      - "qontrol_explorer/angular_z"